<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fullscreen Grid</title>
    <!-- Gridstack CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/gridstack/4.2.8/gridstack.min.css" />
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        #output {
            margin: 0 auto;
            max-width: 980px;
            padding: 1em;
        }
    </style>
</head>
<body>
    <p id="output">
    </p>

    <!-- Gridstack JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gridstack/4.2.8/gridstack.all.js"></script>

    <script>
        const API_KEY = 'ER2uZS5PgBVkCSFDOEwZlypoJCYmy1nCD8eAT92r3wphdhxdRZctbXgkrZ2toytI';
        const YEAR = new Date().getFullYear();

        const team_number = new URLSearchParams(window.location.search).get("team") ?? 346;
        const team_key = `frc${team_number}`;

        async function tba(route) {
          return (await fetch(`https://www.thebluealliance.com/api/v3${route}`, {
            headers: {
              'X-TBA-Auth-Key': API_KEY,
            }
          })).json();
        }

        function formatClock(seconds) {
          const h = Math.floor(seconds / 3600);
          const m = Math.floor((seconds % 3600) / 60);
          const s = Math.floor(seconds % 60);

          return [h, m, s]
            .map(v => v.toString().padStart(2, "0"))
            .join(":");
        }

        function sortBy(arr, iteratee) {
          return [...arr].sort((a, b) => {
            const av = iteratee(a);
            const bv = iteratee(b);

            if (av == null && bv == null) return 0;
            if (av == null) return 1;
            if (bv == null) return -1;

            return av < bv ? -1 : av > bv ? 1 : 0;
          });
        }

        async function output() {
            const lines = [];

            const events = await tba(`/team/${team_key}/events/${YEAR}`);
            const current_events = events.filter((e) => {
              const today = new Date();
              return new Date(e.start_date) <= today && today <= new Date(e.end_date);
            });

            if (current_events.length == 0) {
              lines.push(`No events in progress for team ${team_number}`);
              return lines;
            }

            if (current_events.length > 1) {
              lines.push(`${current_events.length} events in progress for team ${team_number}`);
              return lines;
            }

            const current_event = current_events[0];

            const matches = await tba(`/team/${team_key}/event/${current_event.key}/matches`);

            const next_match = sortBy(
              matches.filter(m => m.actual_time == null),
              m => m.predicted_time
            )[0];

            if (next_match == null) {
              lines.push(`No more matches for team ${team_number}`);
              return lines;
            }
            console.log(next_match);

            lines.push(`Match number: ${next_match.match_number}`);
            lines.push(`Estimated start in: ${formatClock(next_match.predicted_time - new Date() / 1000)}`);

            const is_blue = next_match.alliances.blue.team_keys.includes(team_key);
            lines.push(`Alliance: ${is_blue ? "Blue" : "Red"}`);

            const alliance = is_blue ? next_match.alliances.blue : next_match.alliances.red;
            lines.push(`Station: ${alliance.team_keys.indexOf(team_key) + 1}`);

            const enemy = is_blue ? next_match.alliances.red : next_match.alliances.blue;

            const teammates = alliance.team_keys.filter(k => k != team_key).map(k => k.slice(3));
            lines.push(`Teammates: ${teammates}`);

            lines.push(`Against: ${enemy.team_keys.map(k => k.slice(3))}`);

            const all_event_matches = await tba(`/event/${current_event.key}/matches`);
            console.log(all_event_matches);
            const current_match = sortBy(
              all_event_matches.filter(m => m.actual_time == null),
              m => m.predicted_time
            )[0];

            lines.push('');

            const matches_to_go = next_match.match_number - current_match.match_number;
            lines.push(`Current match: ${current_match.match_number}`);
            lines.push(`Matches until you: ${matches_to_go}`);
            if (matches_to_go == 1) {
              lines.push(`ON DECK`);
            }

            return lines;
        }

        async function setOutput() {
            const lines = await output();
            document.getElementById('output').innerHTML = lines.map(l => `<p>${l}</p>`).join('');
        }

        setInterval(setOutput, 10000);
        setOutput();
    </script>
</body>
</html>
